name: Deploy Flask MySQL App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -euxo pipefail

            APP_DIR="$HOME/Flask-MySQL-DevOps-Project"

            echo "========== 1. Go to project directory =========="
            cd "$APP_DIR"

            echo "========== 2. Update project code =========="
            git fetch origin
            git reset --hard origin/main

            echo "========== 3. Check required files =========="
            pwd
            ls -la
            test -f docker-compose.yml
            test -f .env

            echo "========== 4. Show docker versions =========="
            docker --version
            docker compose version

            echo "========== 5. Validate compose file =========="
            docker compose config > /tmp/compose-rendered.yml
            echo "Compose file rendered successfully"

            echo "========== 6. Stop old containers =========="
            docker compose down || true

            echo "========== 7. Start only database first =========="
            docker compose up -d db

            DB_CONTAINER_ID="$(docker compose ps -q db)"

            if [ -z "$DB_CONTAINER_ID" ]; then
              echo "ERROR: Could not find DB container ID"
              docker compose ps
              exit 1
            fi

            echo "DB container ID: $DB_CONTAINER_ID"

            echo "========== 8. Wait for DB health =========="
            for i in $(seq 1 12); do
              STATUS="$(docker inspect --format='{{.State.Status}}' "$DB_CONTAINER_ID" 2>/dev/null || echo unknown)"
              HEALTH="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$DB_CONTAINER_ID" 2>/dev/null || echo unknown)"

              echo "Attempt $i/12 -> container status: $STATUS | health: $HEALTH"

              if [ "$HEALTH" = "healthy" ]; then
                echo "Database is healthy."
                break
              fi

              if [ "$STATUS" = "exited" ] || [ "$STATUS" = "dead" ]; then
                echo "Database container exited early."
                break
              fi

              sleep 10
            done

            echo "========== 9. DB container inspection =========="
            docker compose ps
            docker inspect "$DB_CONTAINER_ID" --format='
            Container Name: {{.Name}}
            Status: {{.State.Status}}
            ExitCode: {{.State.ExitCode}}
            StartedAt: {{.State.StartedAt}}
            FinishedAt: {{.State.FinishedAt}}
            Health: {{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}
            '

            echo "========== 10. DB healthcheck log =========="
            docker inspect "$DB_CONTAINER_ID" --format='{{if .State.Health}}{{range .State.Health.Log}}
            ----
            Start: {{.Start}}
            End: {{.End}}
            ExitCode: {{.ExitCode}}
            Output:
            {{.Output}}
            {{end}}{{else}}No healthcheck log available{{end}}'

            echo "========== 11. DB container logs =========="
            docker compose logs db --tail=200 || true

            DB_HEALTH="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$DB_CONTAINER_ID" 2>/dev/null || echo unknown)"

            if [ "$DB_HEALTH" != "healthy" ]; then
              echo "ERROR: Database did not become healthy."

              echo "========== Extra diagnostics =========="
              echo "--- docker compose ps ---"
              docker compose ps || true

              echo "--- docker compose logs ---"
              docker compose logs --tail=200 || true

              echo "--- docker inspect raw state ---"
              docker inspect "$DB_CONTAINER_ID" --format='{{json .State}}' || true

              exit 1
            fi

            echo "========== 12. Start full application =========="
            docker compose up -d

            echo "========== 13. Final status =========="
            docker compose ps

            echo "========== 14. Final logs =========="
            docker compose logs --tail=100 || true
