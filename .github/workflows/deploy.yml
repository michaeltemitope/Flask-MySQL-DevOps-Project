# =============================================================
# .github/workflows/deploy.yml
#
# Purpose  : CI/CD pipeline for Flask + MySQL Docker application
# Trigger  : Push to main branch or manual workflow_dispatch
# CI       : Runs on GitHub-hosted runner (ubuntu-latest)
# CD       : Deploys to AWS EC2 via SSH
#
# Required GitHub Secrets:
#   EC2_HOST            - Public IP or DNS of your EC2 instance
#   EC2_USER            - SSH user (e.g. ec2-user or ubuntu)
#   EC2_SSH_PRIVATE_KEY - Full contents of your .pem private key
#   EC2_PORT            - SSH port (optional, defaults to 22)
#   ENV_FILE_CONTENT    - Full contents of your .env file
# =============================================================

name: CI/CD Pipeline

# -------------------------------------------------------------
# TRIGGERS
# Runs automatically on push to main
# Can also be triggered manually via GitHub Actions UI
# -------------------------------------------------------------
on:
  push:
    branches:
      - main
  workflow_dispatch:

# -------------------------------------------------------------
# CONCURRENCY
# Prevents two deployments running at the same time
# If a new push comes in while deploying, the old run is cancelled
# -------------------------------------------------------------
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# -------------------------------------------------------------
# PERMISSIONS
# Minimal permissions — read-only access to repository contents
# No write access granted unless explicitly needed
# -------------------------------------------------------------
permissions:
  contents: read

jobs:

  # =============================================================
  # JOB 1 — CI
  # Validates the codebase on a GitHub-hosted runner
  # Does NOT build the final image — that happens on EC2
  # =============================================================
  ci:
    name: CI — Validate
    runs-on: ubuntu-latest

    steps:

      # -----------------------------------------------------------
      # Step 1 — Checkout code
      # -----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------
      # Step 2 — Validate docker-compose configuration
      # Creates a dummy .env with placeholder values so that
      # docker compose config can substitute variables without
      # needing real credentials on the runner
      # -----------------------------------------------------------
      - name: Validate docker-compose configuration
        run: |
          cat <<EOF > .env
          DB_HOST=db
          DB_PORT=3306
          DB_USER=dummy_user
          DB_PASSWORD=dummy_password
          DB_NAME=dummy_db
          DB_MAX_RETRIES=30
          DB_RETRY_INTERVAL=2
          DB_MAX_SLEEP=30
          MYSQL_ROOT_PASSWORD=dummy_root_password
          MYSQL_USER=dummy_user
          MYSQL_PASSWORD=dummy_password
          MYSQL_DATABASE=dummy_db
          EOF
          docker compose config --quiet
          echo "docker-compose.yml syntax is valid"

      # -----------------------------------------------------------
      # Step 3 — Validate Dockerfile builds successfully
      # Temporary build on runner — not pushed anywhere
      # Catches Dockerfile errors before they reach EC2
      # -----------------------------------------------------------
      - name: Validate Dockerfile build
        run: |
          docker build -t flask-app-ci-check .
          echo "Dockerfile build successful"

      # -----------------------------------------------------------
      # Step 4 — Validate wait-for-db.sh syntax
      # bash -n checks syntax without executing the script
      # -----------------------------------------------------------
      - name: Validate wait-for-db.sh syntax
        run: |
          bash -n wait-for-db.sh
          echo "wait-for-db.sh syntax is valid"

      # -----------------------------------------------------------
      # Step 5 — Integration test
      # Spins up the full stack on the runner
      # Polls /health until Flask is ready or timeout is reached
      # Always tears down the stack after the test
      # -----------------------------------------------------------
      - name: Run integration test
        run: |
          echo "Starting stack for integration test..."
          docker compose up -d --build

          echo "Waiting for Flask to become healthy..."
          TIMEOUT=120
          ELAPSED=0
          until curl -sf http://localhost:5000/health; do
            if [ "${ELAPSED}" -ge "${TIMEOUT}" ]; then
              echo "ERROR: Flask did not become healthy within ${TIMEOUT}s"
              docker compose logs
              docker compose down -v
              exit 1
            fi
            echo "Not ready yet. Waiting 5s... (${ELAPSED}s elapsed)"
            sleep 5
            ELAPSED=$(( ELAPSED + 5 ))
          done
          echo "Integration test passed — /health responded successfully"

      - name: Tear down integration test stack
        if: always()
        run: |
          docker compose down -v
          echo "Integration test stack torn down"

  # =============================================================
  # JOB 2 — CD
  # Deploys to EC2 via SSH only after CI passes
  # All Docker build and run steps happen on EC2 directly
  # =============================================================
  cd:
    name: CD — Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci

    steps:

      # -----------------------------------------------------------
      # Step 1 — Checkout code
      # -----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------
      # Step 2 — Set up SSH key and known_hosts
      #
      # IMPROVEMENT: Removed -o StrictHostKeyChecking=no
      # Previously SSH blindly trusted any server it connected to
      # which is a security risk — a malicious server could
      # intercept the connection undetected
      #
      # Now we use ssh-keyscan to fetch EC2's real fingerprint
      # and add it to known_hosts before connecting
      # SSH will verify the server matches this fingerprint
      # on every connection — connection is rejected if it does not
      # -----------------------------------------------------------
      - name: Set up SSH key and verify EC2 host fingerprint
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write private key from GitHub Secrets to temp file
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Fetch EC2 host fingerprint and add to known_hosts
          # This replaces -o StrictHostKeyChecking=no with proper
          # host verification — SSH will now validate the server
          # identity on every connection
          ssh-keyscan -p ${{ secrets.EC2_PORT || '22' }} \
            -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          echo "SSH key and host verification configured"

      # -----------------------------------------------------------
      # Step 3 — Write .env file to EC2 safely
      #
      # IMPROVEMENT: Replaced unsafe echo approach with scp
      # Previously: echo '${{ secrets.ENV_FILE_CONTENT }}' > .env
      # This broke silently if any value contained a single quote
      #
      # Now we write the .env locally on the runner first using
      # a heredoc with a quoted delimiter (<<'EOF') which handles
      # all special characters safely including quotes, dollar signs
      # and multiline values — then transfer it securely via scp
      # -----------------------------------------------------------
      - name: Write .env file securely to EC2
        run: |
          # Write .env locally on the runner using quoted heredoc
          # The quoted 'EOF' delimiter prevents any shell expansion
          # so special characters in secrets are preserved exactly
          cat <<'EOF' > /tmp/app.env
          ${{ secrets.ENV_FILE_CONTENT }}
          EOF

          # Transfer .env to EC2 using scp
          # scp encrypts the transfer over SSH — no plaintext
          scp -i ~/.ssh/deploy_key \
              -P ${{ secrets.EC2_PORT || '22' }} \
              /tmp/app.env \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/app/.env

          # Remove local copy immediately after transfer
          rm -f /tmp/app.env
          echo ".env file transferred securely to EC2"

      # -----------------------------------------------------------
      # Step 4 — Deploy to EC2
      #
      # IMPROVEMENT 1: Replaced git pull with git fetch + reset
      # git pull can behave differently depending on local state
      # git fetch + git reset --hard is fully deterministic —
      # it always makes EC2 exactly match the remote main branch
      # regardless of any local divergence or uncommitted changes
      #
      # IMPROVEMENT 2: set -e at the top of remote commands
      # Any failed command stops the deployment immediately
      # instead of continuing with broken or partial state
      #
      # IMPROVEMENT 3: Clear timestamped log messages at each step
      # Makes it easy to pinpoint exactly where a failure occurred
      # when reading GitHub Actions logs
      # -----------------------------------------------------------
      - name: Deploy application to EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.EC2_PORT || '22' }} \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'

            # Stop immediately if any command fails
            set -e

            echo "============================================"
            echo "Deployment started: $(date)"
            echo "Commit: ${{ github.sha }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Triggered by: ${{ github.actor }}"
            echo "============================================"

            APP_DIR="/home/${{ secrets.EC2_USER }}/app"

            # Navigate to application directory
            echo "[1/5] Navigating to application directory..."
            cd "${APP_DIR}"

            # Fetch latest code from remote
            # git fetch downloads changes without applying them
            # git reset --hard then forces local state to exactly
            # match the remote branch — clean and deterministic
            echo "[2/5] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Stop existing containers gracefully
            # --timeout 30 gives containers 30 seconds to shut
            # down cleanly before Docker forces termination
            echo "[3/5] Stopping existing containers..."
            docker compose down --timeout 30

            # Rebuild Flask image on EC2 and start all containers
            # --build forces rebuild so latest code is always used
            echo "[4/5] Rebuilding and starting containers..."
            docker compose up -d --build

            # Remove dangling images to reclaim disk space
            # Dangling images are old layers no longer referenced
            # || true prevents pipeline failure if nothing to prune
            echo "[5/5] Cleaning up unused Docker images..."
            docker image prune -f || true

            echo "============================================"
            echo "Deployment complete: $(date)"
            echo "============================================"

          ENDSSH

      # -----------------------------------------------------------
      # Step 5 — Verify deployment health
      # Polls /health on EC2 after deployment completes
      # Confirms the new version is live and DB is connected
      # Fails the pipeline clearly if app never becomes healthy
      # -----------------------------------------------------------
      - name: Verify deployment health on EC2
        run: |
          echo "Verifying deployment health..."
          TIMEOUT=60
          ELAPSED=0
          until curl -sf http://${{ secrets.EC2_HOST }}:5000/health; do
            if [ "${ELAPSED}" -ge "${TIMEOUT}" ]; then
              echo "ERROR: App did not become healthy after deployment"
              exit 1
            fi
            echo "App not ready yet. Waiting 5s... (${ELAPSED}s elapsed)"
            sleep 5
            ELAPSED=$(( ELAPSED + 5 ))
          done
          echo "Deployment verified — app is live and healthy at EC2"

      # -----------------------------------------------------------
      # Step 6 — Clean up SSH key and temp files
      # Removes all sensitive files from the runner
      # Runs always — even if deployment steps above failed
      # -----------------------------------------------------------
      - name: Clean up sensitive files from runner
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -f /tmp/app.env
          echo "Sensitive files cleaned up from runner"
